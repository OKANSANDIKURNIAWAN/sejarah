<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statistik Reformasi 1998</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&amp;family=DM+Serif+Display&amp;family=Source+Code+Pro:wght@400;700&amp;family=Crimson+Pro:wght@400;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
    <style>
      .stat-card {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        padding: 2rem;
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .stat-card::before {
        content: '';
        position: absolute;
        top: -50px;
        right: -50px;
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        border-radius: 50%;
        transition: all 0.3s ease;
      }

      .stat-card:hover {
        transform: translateY(-8px);
      }

      .stat-card:hover::before {
        width: 250px;
        height: 250px;
      }

      .stat-card.card-1 {
        background: linear-gradient(135deg, rgba(234,179,8,0.12) 0%, rgba(234,179,8,0.05) 100%);
        border: 2px solid rgba(234,179,8,0.4);
      }

      .stat-card.card-2 {
        background: linear-gradient(135deg, rgba(220,38,38,0.12) 0%, rgba(220,38,38,0.05) 100%);
        border: 2px solid rgba(220,38,38,0.4);
      }

      .stat-card.card-3 {
        background: linear-gradient(135deg, rgba(251,191,36,0.12) 0%, rgba(251,191,36,0.05) 100%);
        border: 2px solid rgba(251,191,36,0.4);
      }

      .stat-number {
        font-size: 3rem;
        font-weight: 900;
        margin-bottom: 0.5rem;
        font-family: 'Playfair Display', serif;
        text-shadow: 0 0 20px;
        position: relative;
        z-index: 2;
        line-height: 1;
      }

      .card-1 .stat-number {
        color: #eab308;
        text-shadow: 0 0 20px rgba(234,179,8,0.4);
      }

      .card-2 .stat-number {
        color: #dc2626;
        text-shadow: 0 0 20px rgba(220,38,38,0.4);
      }

      .card-3 .stat-number {
        color: #fbbf24;
        text-shadow: 0 0 20px rgba(251,191,36,0.4);
      }

      .stat-label {
        font-size: 0.9rem;
        letter-spacing: 2px;
        font-weight: 600;
        color: #c8a97e;
        margin-bottom: 0.5rem;
        position: relative;
        z-index: 2;
      }

      .stat-description {
        font-size: 0.9rem;
        color: #a89968;
        font-style: italic;
        position: relative;
        z-index: 2;
      }

      .container-stats {
        max-width: 1200px;
        margin: 0 auto;
        padding: 4rem 2rem;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 2rem;
        margin-top: 3rem;
      }

      .page-header {
        text-align: center;
        margin-bottom: 3rem;
      }

      .page-header h1 {
        font-size: 3rem;
        font-family: 'Playfair Display', serif;
        color: #f2e8d5;
        margin-bottom: 1rem;
        text-shadow: 0 0 30px rgba(139, 26, 26, 0.4);
      }

      .page-header p {
        color: #c8a97e;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
      }

      .divider {
        width: 60px;
        height: 2px;
        background: linear-gradient(90deg, transparent, #d4a017, transparent);
        margin: 1rem auto;
      }
    </style>
  </head>
  <body class="h-full">
    <!-- CUSTOM CURSOR -->
    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <div id="cursor-trail"></div>

    <!-- TOP NAVIGATION -->
    <nav id="topnav">
      <div class="topnav-logo" onclick="window.location.href = 'index.html'">
        REFORMASI <span>1998</span>
      </div>
      <div class="topnav-links">
        <button
          class="topnav-btn"
          onclick="window.location.href = 'index.html'"
        >
          Beranda
        </button>
        <button
          class="topnav-btn"
          onclick="window.location.href = 'materi.html'"
        >
          Materi
        </button>
        <button
          class="topnav-btn active"
          onclick="window.location.href = 'statistik.html'"
        >
          Statistik
        </button>
        <button
          class="topnav-btn"
          onclick="window.location.href = 'aboutus.html'"
        >
          About Us
        </button>
      </div>
    </nav>

    <div
      id="app"
      class="h-full w-full overflow-auto bg-[#0a0505] text-[#e8ddd0] relative"
    >
      <!-- Grain overlay -->
      <div class="grain-overlay"></div>
      <!-- Red warning glow -->
      <div class="red-warning"></div>
      <!-- Floating rupiah notes -->
      <div
        id="floating-notes"
        class="fixed inset-0 pointer-events-none z-10 overflow-hidden"
      ></div>
      <!-- Background charts -->
      <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <svg
          class="chart-bg"
          style="top: 10%; left: 5%; width: 300px; height: 200px"
          viewbox="0 0 100 100"
        >
          <polyline
            fill="none"
            stroke="#ff3030"
            stroke-width="0.5"
            points="0,20 10,22 20,18 30,25 40,30 50,45 60,70 70,85 80,90 90,95 100,98"
          />
        </svg>
        <svg
          class="chart-bg"
          style="top: 40%; right: 5%; width: 250px; height: 150px"
          viewbox="0 0 100 100"
        >
          <polyline
            fill="none"
            stroke="#ff3030"
            stroke-width="0.5"
            points="0,10 15,12 30,15 45,20 55,40 65,65 75,80 85,92 100,97"
          />
        </svg>
      </div>
      <!-- Smoke particles -->
      <div class="fixed inset-0 pointer-events-none z-5 overflow-hidden">
        <div
          class="smoke-particle"
          style="left: 10%; bottom: 0; animation-delay: 0s"
        ></div>
        <div
          class="smoke-particle"
          style="left: 30%; bottom: 0; animation-delay: 2s"
        ></div>
        <div
          class="smoke-particle"
          style="left: 60%; bottom: 0; animation-delay: 4s"
        ></div>
        <div
          class="smoke-particle"
          style="left: 80%; bottom: 0; animation-delay: 1s"
        ></div>
      </div>

      <!-- CONTENT -->
      <div class="container-stats">
        <div class="page-header">
          <h1>Statistik / Data Kanan</h1>
          <div class="divider"></div>
          <p>Kepemimpinan Soeharto dan Peralihan Kekuasaan 1998</p>
        </div>

        <div class="stats-grid">
          <!-- Card 1: Durasi Kepemimpinan -->
          <div class="stat-card card-1">
            <div class="stat-number">32</div>
            <div class="stat-label">TAHUN</div>
            <div class="stat-description">Masa Kepemimpinan Soeharto</div>
          </div>

          <!-- Card 2: Tanggal Pengunduran Diri -->
          <div class="stat-card card-2">
            <div class="stat-number">21 MEI</div>
            <div class="stat-label">1998</div>
            <div class="stat-description">Tanggal Pengunduran Diri</div>
          </div>

          <!-- Card 3: Penerus Kepemimpinan -->
          <div class="stat-card card-3">
            <div class="stat-number">KE-3</div>
            <div class="stat-label">PRESIDEN</div>
            <div class="stat-description">B.J. Habibie Dilantik</div>
          </div>
        </div>
      </div>
    </div>

    <!-- SCRIPTS -->
    <script src="script.js"></script>
  </body>
</html>
