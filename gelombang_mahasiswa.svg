<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%; display: block; filter: sepia(0.9) contrast(1.1) brightness(0.45);">
<rect width="400" height="300" fill="#0a0805" />
<!-- portrait frame -->
<rect x="130" y="30" width="140" height="170" fill="#120e08" stroke="#c8a97e" stroke-width="1" opacity="0.3" />
<!-- silhouette in frame -->
<ellipse cx="200" cy="100" rx="35" ry="45" fill="#1a1508" />
<rect x="155" y="138" width="90" height="60" fill="#150f08" />
<!-- military stars/medals suggestion -->
<circle cx="170" cy="155" r="4" fill="#c8a97e" opacity="0.3" />
<circle cx="185" cy="150" r="4" fill="#c8a97e" opacity="0.3" />
<circle cx="200" cy="148" r="4" fill="#c8a97e" opacity="0.3" />
<circle cx="215" cy="150" r="4" fill="#c8a97e" opacity="0.3" />
<circle cx="230" cy="155" r="4" fill="#c8a97e" opacity="0.3" />
<!-- caption -->
<rect x="140" y="205" width="120" height="20" fill="#f2e8d5" opacity="0.07" />
<text x="200" y="219" fill="#f2e8d5" font-size="8" font-family="serif" text-anchor="middle" opacity="0.5">PRESIDEN RI 1967–1998</text>
<!-- 32 years text -->
<text x="200" y="270" fill="#c8a97e" font-size="45" font-family="serif" text-anchor="middle" opacity="0.12" font-weight="bold">32</text>
<text x="200" y="285" fill="#c8a97e" font-size="10" font-family="serif" text-anchor="middle" opacity="0.3">TAHUN BERKUASA</text>
<rect x="0" y="0" width="400" height="300" fill="url(#cellGrad2)" />
<defs>
<linearGradient id="cellGrad2" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#0a0805" stop-opacity="0.4" />
<stop offset="100%" stop-color="#0a0805" stop-opacity="0.5" />
</linearGradient>
</defs>
</svg>