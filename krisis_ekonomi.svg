<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%; display: block; filter: sepia(0.9) contrast(1.1) brightness(0.45);">
<rect width="400" height="300" fill="#0d0b05" />
<!-- chart falling -->
<polyline points="0,50 40,55 80,70 120,95 160,140 200,170 240,210 280,235 320,250 360,265 400,275" fill="none" stroke="#c8a97e" stroke-width="2" opacity="0.4" />
<!-- grid lines -->
<g stroke="#1a1508" stroke-width="0.5" opacity="0.5">
<line x1="0" y1="60" x2="400" y2="60" />
<line x1="0" y1="120" x2="400" y2="120" />
<line x1="0" y1="180" x2="400" y2="180" />
<line x1="0" y1="240" x2="400" y2="240" />
</g>
<!-- currency symbols scattered -->
<text x="50" y="200" fill="#c8a97e" font-size="30" opacity="0.15" font-family="serif">Rp</text>
<text x="200" y="240" fill="#c8a97e" font-size="20" opacity="0.1" font-family="serif">$</text>
<text x="300" y="150" fill="#c8a97e" font-size="25" opacity="0.12" font-family="serif">%</text>
<!-- newspaper headline overlay -->
<rect x="20" y="30" width="360" height="50" fill="#f2e8d5" opacity="0.06" rx="1" />
<text x="200" y="60" fill="#f2e8d5" font-size="11" font-family="serif" text-anchor="middle" opacity="0.4">RUPIAH TERJUN BEBAS — JANUARI 1998</text>
<!-- people queuing at bank -->
<g fill="#080602" opacity="0.8">
<ellipse cx="30" cy="270" rx="8" ry="18" />
<circle cx="30" cy="254" r="6" />
<ellipse cx="50" cy="272" rx="8" ry="18" />
<circle cx="50" cy="256" r="6" />
<ellipse cx="70" cy="269" rx="7" ry="17" />
<circle cx="70" cy="254" r="5" />
<ellipse cx="88" cy="271" rx="8" ry="18" />
<circle cx="88" cy="255" r="6" />
<ellipse cx="108" cy="270" rx="7" ry="17" />
<circle cx="108" cy="255" r="5" />
</g>
<rect x="0" y="0" width="400" height="300" fill="url(#cellGrad1)" />
<defs>
<linearGradient id="cellGrad1" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#0d0b05" stop-opacity="0.6" />
<stop offset="50%" stop-color="#0d0b05" stop-opacity="0" />
<stop offset="100%" stop-color="#0d0b05" stop-opacity="0.5" />
</linearGradient>
</defs>
</svg>