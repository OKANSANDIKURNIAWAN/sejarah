<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%; display: block; filter: sepia(0.9) contrast(1.1) brightness(0.45);">
<rect width="400" height="300" fill="#0d0b06" />
<!-- newspaper stack -->
<rect x="30" y="40" width="160" height="220" fill="#f2e8d5" opacity="0.1" rx="1" />
<rect x="40" y="50" width="160" height="220" fill="#f2e8d5" opacity="0.08" rx="1" />
<rect x="50" y="60" width="160" height="220" fill="#f2e8d5" opacity="0.06" rx="1" />
<!-- headline text -->
<rect x="60" y="75" width="140" height="3" fill="#c8a97e" opacity="0.3" />
<rect x="60" y="85" width="120" height="2" fill="#c8a97e" opacity="0.2" />
<rect x="60" y="92" width="130" height="2" fill="#c8a97e" opacity="0.2" />
<rect x="60" y="99" width="100" height="2" fill="#c8a97e" opacity="0.15" />
<!-- IMF logo suggestion -->
<circle cx="300" cy="100" r="50" fill="#0a0805" stroke="#c8a97e" stroke-width="0.5" opacity="0.2" />
<text x="300" y="105" fill="#c8a97e" font-size="14" font-family="serif" text-anchor="middle" opacity="0.2">IMF</text>
<!-- globe lines -->
<ellipse cx="300" cy="200" rx="60" ry="70" fill="none" stroke="#c8a97e" stroke-width="0.5" opacity="0.15" />
<line x1="240" y1="200" x2="360" y2="200" stroke="#c8a97e" stroke-width="0.5" opacity="0.15" />
<line x1="300" y1="130" x2="300" y2="270" stroke="#c8a97e" stroke-width="0.5" opacity="0.15" />
<ellipse cx="300" cy="200" rx="30" ry="70" fill="none" stroke="#c8a97e" stroke-width="0.5" opacity="0.1" />
<rect x="0" y="0" width="400" height="300" fill="url(#cellGrad3)" />
<defs>
<linearGradient id="cellGrad3" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#0d0b06" stop-opacity="0.4" />
<stop offset="100%" stop-color="#0d0b06" stop-opacity="0.5" />
</linearGradient>
</defs>
</svg>